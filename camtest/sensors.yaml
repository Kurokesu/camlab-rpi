# camtest sensor registry - curated, human-maintained source of truth.
#
# Each entry drives the sensor selector and how ConfigManager composes the
# managed dtoverlay line in /boot/firmware/config.txt. The CSI port (cam0/cam1)
# is a per-RIG setting (not per-sensor) and lives in the managed block, so it is
# NOT listed here.
#
# Fields:
#   name         display name in the GUI
#   overlay      dtoverlay token, must exist in /boot/firmware/overlays/
#   driver_repo  Kurokesu DKMS driver repo name. drivers.sh clones it from the
#                Kurokesu org (or a full git URL, if given). Single source of truth.
#   options      fixed overlay params appended after the port (e.g. [4lane]). Do
#                NOT put the mono param here; colour/mono is a per-rig runtime
#                choice (see mono_option) made in the Select sensor modal.
#   color        informational only (true = colour). For a mono_option sensor it
#                is just the default variant before the operator picks one.
#   mono_option  overlay param that selects the monochrome variant (e.g. "mono").
#                Set it for sensors that ship in both colour and mono and do NOT
#                auto-detect (imx585, imx462): its presence adds a Color/Mono
#                selector to the modal and the choice is persisted in config.txt.
#                Omit for colour-only sensors and for ar0234 (driver auto-detects).
#   notes        free-form operator note
#   info_registers (optional) curated smbus2 identity probes:
#     - { name: "...", addr: 0xNNNN, len: N }
#
# [VERIFY] overlay tokens / options / info_registers per sensor against each
# driver repo before trusting an entry.

sensors:
  #A driver_repo marks a Kurokesu
  # out-of-tree sensor that drivers.sh builds via DKMS (repo name under
  # github.com/Kurokesu, the <sensor>-rpi-driver convention; override the org
  # base with CAMTEST_DRIVER_BASE_URL). Entries without driver_repo are mainline
  # sensors whose driver + overlay ship with Raspberry Pi OS, so drivers.sh skips
  # them and the overlay is already in /boot/firmware/overlays.
  - name: AR0234
    overlay: ar0234
    driver_repo: ar0234-rpi-driver
    options: [4lane]          # 4-lane MIPI, driver auto-detects color vs mono
    color: true
    notes: "2.3MP global shutter, 1920x1200"

  - name: AR0822
    overlay: ar0822
    driver_repo: ar0822-rpi-driver
    options: [4lane]          # 4-lane MIPI
    color: true               # AR0822 is color, no mono overlay param
    notes: "8MP rolling shutter, 4K40 / 1080p120"

  - name: IMX283
    overlay: imx283
    options: []               # 4-lane only (no lane param), needs CM/Pi5
    color: true
    notes: "20MP, 5472x3648"

  - name: IMX462
    overlay: imx462
    options: []               # 2-lane default (overlay also supports 4lane)
    color: true               # colour/mono selectable (imx462lqr / imx462llr)
    mono_option: mono
    notes: "2MP Starvis color/mono, 1080p, high NIR sensitivity"

  - name: IMX477
    overlay: imx477
    options: []
    color: true
    notes: "12.3MP HQ Camera, 4056x3040"

  - name: IMX585
    overlay: imx585
    driver_repo: imx585-rpi-driver
    options: []               # 4-lane default; colour/mono selectable, not auto-detected
    color: true
    mono_option: mono
    notes: "8.3MP STARVIS 2 color/mono, ~4K"
