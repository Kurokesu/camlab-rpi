# Build versioned install archive and publish a release on version tag push
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check tag matches __version__
        run: |
          version="$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' camlab/__init__.py)"
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match __version__ $version" >&2
            exit 1
          fi

      - name: Build archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="camlab-rpi-${version}/" \
            -o "camlab-rpi-${version}.tar.gz" "$GITHUB_REF_NAME"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          prerelease=""
          case "$GITHUB_REF_NAME" in
            *-*) prerelease="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" "camlab-rpi-${version}.tar.gz" \
            --title "$GITHUB_REF_NAME" --verify-tag --generate-notes $prerelease
