# Build install zip and publish a release on version tag push
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build archive
        run: git archive --format=zip --prefix=camlab-rpi/ -o "camlab-rpi-$GITHUB_REF_NAME.zip" "$GITHUB_REF_NAME"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "$GITHUB_REF_NAME" in
            *-alpha*|*-beta*) prerelease="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" "camlab-rpi-$GITHUB_REF_NAME.zip" \
            --title "$GITHUB_REF_NAME" --verify-tag --generate-notes $prerelease
